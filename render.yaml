services:
  - type: web
    name: castro-ai
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: ANTHROPIC_API_KEY
        sync: false
